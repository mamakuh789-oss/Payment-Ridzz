<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Pembayaran KECE | Ridzznot4u</title>
    <!-- Google Fonts + Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0B1120 0%, #111827 100%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
        }

        /* efek grid modern */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 32px 32px;
            pointer-events: none;
            z-index: 0;
        }

        .payment-card {
            max-width: 520px;
            width: 100%;
            background: rgba(18, 25, 45, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 3rem;
            border: 1px solid rgba(72, 187, 255, 0.2);
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(72, 187, 255, 0.1) inset;
            padding: 2rem 1.8rem;
            transition: all 0.3s ease;
            z-index: 2;
        }

        /* header keren */
        .brand {
            text-align: center;
            margin-bottom: 2rem;
        }

        .badge {
            background: rgba(72, 187, 255, 0.15);
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.3px;
            color: #7BC9FF;
            border: 1px solid rgba(72, 187, 255, 0.3);
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF 0%, #B0D4FF 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .subhead {
            color: #8E9BB0;
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }

        /* metode list */
        .method-list {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            margin: 2rem 0;
        }

        .method-item {
            background: rgba(12, 18, 30, 0.7);
            border-radius: 2rem;
            padding: 1rem 1.2rem;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(4px);
        }

        .method-item:hover {
            transform: translateY(-3px);
            background: rgba(20, 30, 50, 0.8);
            border-color: rgba(72, 187, 255, 0.4);
            box-shadow: 0 12px 22px -10px rgba(0,0,0,0.4);
        }

        .method-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .icon-bg {
            width: 48px;
            height: 48px;
            background: linear-gradient(145deg, #1E2A3A, #0F1622);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.7rem;
            box-shadow: 0 5px 10px rgba(0,0,0,0.3);
        }

        .dana-icon {
            color: #3A9BFF;
        }

        .gopay-icon {
            color: #00A6A6;
        }

        .method-title {
            font-weight: 700;
            font-size: 1.3rem;
            color: white;
        }

        .method-detail {
            padding-left: 4rem;
        }

        .nomor {
            font-family: 'Monaco', 'Menlo', monospace;
            background: #03060C;
            padding: 0.6rem 1rem;
            border-radius: 1.2rem;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            color: #C3E2FF;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            flex-wrap: wrap;
            margin: 0.4rem 0;
            border: 1px solid #2A3A55;
            width: 100%;
            justify-content: space-between;
        }

        .nomor span {
            word-break: break-all;
            font-size: 0.95rem;
        }

        .copy-btn {
            background: rgba(255,255,255,0.05);
            border: none;
            padding: 6px 12px;
            border-radius: 40px;
            color: #A0BBE0;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: inherit;
        }

        .copy-btn:hover {
            background: #2D4B7C;
            color: white;
        }

        .nama {
            font-size: 0.85rem;
            color: #A0B3D0;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .nama i {
            font-size: 0.75rem;
            opacity: 0.7;
        }

        .total-info {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 1.5rem;
            padding: 0.8rem 1rem;
            margin: 1.5rem 0 1rem;
            text-align: center;
            border: 1px dashed rgba(114, 168, 255, 0.4);
        }

        .total-info p {
            color: #B9CAF0;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .footer-note {
            text-align: center;
            font-size: 0.7rem;
            color: #5A6E8A;
            margin-top: 2rem;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 1.2rem;
        }

        .toast-msg {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: #1F2A48;
            backdrop-filter: blur(16px);
            color: white;
            padding: 10px 20px;
            border-radius: 60px;
            font-size: 0.8rem;
            font-weight: 500;
            z-index: 200;
            transition: 0.2s;
            opacity: 0;
            pointer-events: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            border-left: 3px solid #3B82F6;
        }

        @media (max-width: 480px) {
            .payment-card {
                padding: 1.5rem;
            }
            .method-detail {
                padding-left: 2.8rem;
            }
            .nomor {
                font-size: 0.85rem;
                flex-direction: column;
                align-items: flex-start;
            }
            .copy-btn {
                align-self: flex-end;
            }
        }

        button {
            background: none;
            border: none;
        }
    </style>
</head>
<body>

<div class="payment-card">
    <div class="brand">
        <div class="badge">
            <i class="fas fa-lock"></i> Pembayaran Aman
        </div>
        <h1>Bayar Mudah <i class="fas fa-hand-peace"></i></h1>
        <div class="subhead">Scan / Transfer ke nomor berikut</div>
    </div>

    <div class="method-list">
        <!-- DANA -->
        <div class="method-item" id="danaItem">
            <div class="method-header">
                <div class="icon-bg">
                    <i class="fas fa-wallet dana-icon"></i>
                </div>
                <div class="method-title">DANA</div>
            </div>
            <div class="method-detail">
                <div class="nomor" id="danaNomorBox">
                    <span><i class="fas fa-mobile-alt"></i> 085178162643</span>
                    <button class="copy-btn" data-copy="085178162643" data-name="dana">
                        <i class="far fa-copy"></i> Salin
                    </button>
                </div>
                <div class="nama">
                    <i class="fas fa-user-circle"></i> a.n. ridzznot4u
                </div>
            </div>
        </div>

        <!-- GOPAY -->
        <div class="method-item" id="gopayItem">
            <div class="method-header">
                <div class="icon-bg">
                    <i class="fas fa-qrcode gopay-icon"></i>
                </div>
                <div class="method-title">GoPay</div>
            </div>
            <div class="method-detail">
                <div class="nomor" id="gopayNomorBox">
                    <span><i class="fas fa-mobile-alt"></i> 085178162643</span>
                    <button class="copy-btn" data-copy="085178162643" data-name="gopay">
                        <i class="far fa-copy"></i> Salin
                    </button>
                </div>
                <div class="nama">
                    <i class="fas fa-user-check"></i> a.n. Ridzz
                </div>
            </div>
        </div>
    </div>

    <div class="total-info">
        <p><i class="fas fa-info-circle"></i> Pastikan nomor tujuan sesuai sebelum transfer</p>
        <p style="font-size: 0.7rem; margin-top: 6px;"><i class="fas fa-clock"></i> 24 Jam online · Konfirmasi setelah bayar</p>
    </div>

    <div class="footer-note">
        <i class="fas fa-shield-alt"></i> Data tersimpan aman · Transfer instan
    </div>
</div>

<div id="toastMessage" class="toast-msg">✨ Tersalin ke clipboard!</div>

<script>
    (function() {
        // fungsi show toast modern
        const toast = document.getElementById('toastMessage');
        
        function showToast(message, isError = false) {
            toast.textContent = message || (isError ? '❌ Gagal menyalin' : '✅ Nomor tersalin!');
            toast.style.opacity = '1';
            toast.style.transform = 'translateX(-50%) scale(1)';
            if(isError) {
                toast.style.borderLeftColor = '#EF4444';
            } else {
                toast.style.borderLeftColor = '#3B82F6';
            }
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(-50%) scale(0.9)';
            }, 2000);
        }

        // fungsi copy modern (menggunakan clipboard API)
        async function copyToClipboard(text, methodName) {
            try {
                await navigator.clipboard.writeText(text);
                showToast(`📋 ${methodName} : ${text} berhasil disalin`, false);
                return true;
            } catch (err) {
                // fallback jika clipboard API gagal (textarea lawas)
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast(`📋 ${methodName} : ${text} disalin (manual)`, false);
                return true;
            }
        }

        // pasang event listener ke semua tombol copy
        const copyButtons = document.querySelectorAll('.copy-btn');
        copyButtons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const numberToCopy = btn.getAttribute('data-copy');
                const which = btn.getAttribute('data-name') === 'dana' ? 'DANA' : 'GoPay';
                if(numberToCopy) {
                    copyToClipboard(numberToCopy, which);
                } else {
                    showToast('Gagal, nomor tidak ditemukan', true);
                }
            });
        });

        // efek tambahan: klik pada area nomor box juga bisa copy (opsional biar makin kece)
        const danaBox = document.getElementById('danaNomorBox');
        const gopayBox = document.getElementById('gopayNomorBox');
        
        if(danaBox) {
            danaBox.style.cursor = 'pointer';
            danaBox.addEventListener('click', (e) => {
                // supaya tidak double jika klik tombol copy (tombol sudah trigger sendiri)
                if(e.target.classList && e.target.classList.contains('copy-btn')) return;
                copyToClipboard('085178162643', 'DANA');
            });
        }
        if(gopayBox) {
            gopayBox.style.cursor = 'pointer';
            gopayBox.addEventListener('click', (e) => {
                if(e.target.classList && e.target.classList.contains('copy-btn')) return;
                copyToClipboard('085178162643', 'GoPay');
            });
        }

        // animasi small greet (hanya efek)
        console.log('Payment page siap | Ridzznot4u');
    })();
</script>
</body>
</html>
